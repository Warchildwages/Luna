# Luna CI — Push & PR validation
# Mirrors AllFans CI pattern: typecheck -> test -> build

name: CI

on:
  push:
    branches: [main, submission/**]
  pull_request:
    branches: [main]

env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        env:
          ALLFANS_MOCK_MODE: "true"
        run: pnpm test

      - name: Build (verify compilation)
        run: pnpm build
